services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=changeme
      - xpack.security.http.ssl.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:changeme http://localhost:9200/_cluster/health | grep -q '\"status\"'"]
      interval: 10s
      timeout: 5s
      retries: 10

  kibana-setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      bash -c "curl -s -u elastic:changeme -X POST http://elasticsearch:9200/_security/user/kibana_system/_password
      -H 'Content-Type: application/json' -d '{\"password\": \"changeme\"}'"

  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=changeme
    ports:
      - "80:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
      kibana-setup:
        condition: service_completed_successfully

volumes:
  es_data:
